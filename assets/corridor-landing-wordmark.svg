<svg width="920" height="220" viewBox="0 0 920 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Corridor landing wordmark</title>
  <desc id="desc">Corridor icon with landing-style brand text using a coin-ring o.</desc>

  <defs>
    <linearGradient id="bg" x1="20" y1="12" x2="180" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="beam" x1="100" y1="48" x2="100" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <rect x="12" y="12" width="176" height="176" rx="46" fill="url(#bg)"/>
  <path d="M139 48C129 39 115 33 100 33C71 33 48 56 48 85C48 114 71 137 100 137C116 137 129 130 139 121"
        stroke="white" stroke-width="24" stroke-linecap="round"/>
  <rect x="85" y="54" width="9" height="82" rx="4.5" fill="url(#beam)"/>
  <rect x="106" y="54" width="9" height="82" rx="4.5" fill="url(#beam)"/>
  <path d="M95 136L100 71L105 136H95Z" fill="#E0F2FE"/>
  <path d="M100 71L118 53L124 59L100 84L76 59L82 53L100 71Z" fill="white"/>

  <!-- landing-style wordmark: coin-ring o + rridor -->
  <g transform="translate(232 55)">
    <circle cx="30" cy="45" r="23" stroke="#0F172A" stroke-width="8"/>
    <circle cx="30" cy="45" r="7" fill="#0F172A" fill-opacity="0.2"/>
    <text x="62" y="61" fill="#0F172A" font-family="Sora, Avenir Next, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800" letter-spacing="-1.5">rridor</text>
  </g>
</svg>
